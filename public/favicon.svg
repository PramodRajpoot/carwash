<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#shine)"/>
  <!-- Water drop / clean symbol -->
  <g transform="translate(32,30)" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Car body -->
    <path d="M-16,6 L-14,-2 L-8,-8 L8,-8 L14,-2 L16,6" fill="rgba(255,255,255,0.15)" stroke="#ffffff"/>
    <!-- Car base -->
    <line x1="-18" y1="6" x2="18" y2="6"/>
    <!-- Windows -->
    <line x1="-1" y1="-8" x2="-1" y2="-2"/>
    <!-- Left wheel -->
    <circle cx="-10" cy="9" r="3.5" fill="rgba(255,255,255,0.2)" stroke="#ffffff"/>
    <!-- Right wheel -->
    <circle cx="10" cy="9" r="3.5" fill="rgba(255,255,255,0.2)" stroke="#ffffff"/>
    <!-- Sparkle top-right -->
    <g transform="translate(12,-14)" stroke="#ffffff" stroke-width="2" opacity="0.9">
      <line x1="0" y1="-4" x2="0" y2="4"/>
      <line x1="-4" y1="0" x2="4" y2="0"/>
    </g>
    <!-- Sparkle small -->
    <g transform="translate(-14,-12)" stroke="#ffffff" stroke-width="1.5" opacity="0.7">
      <line x1="0" y1="-2.5" x2="0" y2="2.5"/>
      <line x1="-2.5" y1="0" x2="2.5" y2="0"/>
    </g>
    <!-- Water drops -->
    <circle cx="5" cy="-16" r="1.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="-8" cy="-18" r="1" fill="#ffffff" opacity="0.5"/>
  </g>
  <!-- C&H text -->
  <text x="32" y="54" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.9">C&amp;H</text>
</svg>

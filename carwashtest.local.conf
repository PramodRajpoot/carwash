<VirtualHost *:80>
    ServerName carwashtest.local
    DocumentRoot /var/www/html/carwash/public

    <Directory /var/www/html/carwash/public>
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/carwash_error.log
    CustomLog ${APACHE_LOG_DIR}/carwash_access.log combined
</VirtualHost>
